version: "3.9"

services:
    postgres:
        image: postgres:18-alpine
        container_name: SMS_Postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: scoring_management_system
            POSTGRES_USER: SMSUSER
            POSTGRES_PASSWORD: SMPW
        ports:
            - "4321:5432"
        volumes:
            - pg_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin_container
        environment:
            PGADMIN_DEFAULT_EMAIL: sms@gmail.com
            PGADMIN_DEFAULT_PASSWORD: smpw
        ports:
            - "8090:8081"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        depends_on:
            - postgres

    sms-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: sms-api-dev
        restart: unless-stopped
        ports:
            - "8080:8080"
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scoring_management_system
            SPRING_DATASOURCE_USERNAME: SMSUSER
            SPRING_DATASOURCE_PASSWORD: SMPW
            JWT_SECRET: your-super-secret-key-must-be-at-least-256-bits-long-for-hs256
        depends_on:
            - postgres

volumes:
    pg_data:
    pgadmin_data:
